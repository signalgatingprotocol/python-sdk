name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: Smoke installed MCP CLI
        if: ${{ matrix.python-version == '3.10' }}
        run: python scripts/smoke_mcp_cli.py
      - name: Smoke installed receipts CLI with OpenTelemetry
        if: ${{ matrix.python-version == '3.10' }}
        run: |
          pip install -e ".[otel]"
          python scripts/smoke_receipt_metrics_cli.py
      - run: ruff check .
      - run: mypy src/
      - run: pytest -q
